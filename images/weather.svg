    <line x1="14" y1="14" x2="9"  y2="9"/>
    <line x1="46" y1="46" x2="51" y2="51"/>
    <line x1="46" y1="14" x2="51" y2="9"/>
    <line x1="14" y1="46" x2="9"  y2="51"/>
  </g>

  <!-- Cloud (filled) -->
