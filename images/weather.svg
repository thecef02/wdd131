  <g stroke="#FDB813" stroke-width="5" stroke-linecap="round">
    <line x1="30" y1="8"  x2="30" y2="2"/>
    <line x1="30" y1="58" x2="30" y2="52"/>
    <line x1="8"  y1="30" x2="2"  y2="30"/>
