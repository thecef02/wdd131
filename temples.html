<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - Dynamic Web Fundamentals - Cristian Fernandez</title>
    <meta name="description"
        content="WDD 131 - Dynamic Web Fundamentals. Apply the concepts to a picture album page that is responsive in both small and larger views." />
    <meta name="author" content="Cristian Fernandez" />
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com"/>
    
    <link rel="stylesheet" href="styles/temples.css" />
    <link rel="stylesheet" href="styles/temples-large.css" />
    <script src="scripts/temples.js" defer></script>
</head>

<body>
    <header>
        <h1>Temple Album</h1>
        <nav>
            <a id="menu" href="#"  aria-label="Open menu"> </a>
            <ul class="navigation">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>HOME</h2>
        <div class="container stdlf">
            <figure class="card">
                <img src="images/albuquerque.webp" alt="Albuquerque New Mexico Temple" 
                    fetchpriority=high>
                <figcaption>Albuquerque New Mexico Temple</figcaption>
            </figure>
            <figure class="card">
                <img src="images/cordoba.webp" alt="Córdoba Argentina Temple"  fetchpriority=high>
                <figcaption>Córdoba Argentina Temple</figcaption>
            </figure>
            <figure class="card">
                <img src="images/texas.webp" alt="Dallas Texas Temple"  fetchpriority=high>
                <figcaption>Dallas Texas Temple</figcaption>
            </figure>
            <figure class="card">
                <img src="images/madrid.webp" alt="Madrid Spain Temple" fetchpriority=high>
                <figcaption>Madrid Spain Temple</figcaption>
            </figure>
            <figure class="card">
                <img src="images/montana.webp" alt="Billings Montana Temple"  fetchpriority=high>
                <figcaption>Billings Montana Temple</figcaption>
            </figure>
            <figure class="card">
                <img src="images/guadalajara.webp" alt="Guadalajara Mexico Temple" 
                    fetchpriority=high>
                <figcaption>Guadalajara Mexico Temple</figcaption>
            </figure>
            <figure class="card">
                <img src="images/california.webp" alt="Feather River California Temple" 
                    fetchpriority=high>
                <figcaption>Feather River California Temple</figcaption>
            </figure>
            <figure class="card">
                <img src="images/utah.webp" alt="Draper Utah Temple"  fetchpriority=high>
                <figcaption>Draper Utah Temple</figcaption>
            </figure>
            <figure class="card">
                <img src="images/detroit.webp" alt="Detroit Michigan Temple"  fetchpriority=high>
                <figcaption>Detroit Michigan Temple</figcaption>
            </figure>
        </div>
    </main>
    <footer>
        <p>&copy; <span id="currentyear"></span></p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
