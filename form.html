<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - Dynamic Web Fundamentals - Cristian Fernandez</title>
    <meta name="description"
        content="WDD 131 - Dynamic Web Fundamentals. Build an HTML form with a confirmation page that meets the specified requirements." />
    <meta name="author" content="Cristian Fernandez" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz@1,6..12&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/form.css" />
    <script src="scripts/form.js"  defer></script>
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html" class="review-form">

            <!-- <div class="form-group"> -->
                <label for="productName">Product Name</label>
                <select id="productName" name="productName" required>
                    <option value="" disabled selected>Select a Product ...</option>
                    
                </select>
            <!-- </div> -->

            <div class="form-group">
                <p class="group-title">Overall Rating</p>

                <div class="rating-group">
                    <label>
                        ☆
                        <input type="radio" name="rating" value="1" required>
                    </label>

                    <label>
                        ☆☆
                        <input type="radio" name="rating" value="2">
                    </label>

                    <label>
                        ☆☆☆
                        <input type="radio" name="rating" value="3">
                    </label>

                    <label>
                        ☆☆☆☆
                        <input type="radio" name="rating" value="4">
                    </label>

                    <label>
                        ☆☆☆☆☆
                        <input type="radio" name="rating" value="5">
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="installDate">Date of Installation</label>
                <input type="date" id="installDate" name="installDate" required>
            </div>

            <fieldset class="form-group">
                <legend>Which features did you find useful in the product?<br><em>(Check all that apply)</em></legend>

                <label><input type="checkbox" name="features" value="durability"> Durability</label>
                <label><input type="checkbox" name="features" value="easeOfUse"> Ease of Use</label>
                <label><input type="checkbox" name="features" value="performance"> Performance</label>
                <label><input type="checkbox" name="features" value="design"> Design</label>
            </fieldset>

            <div class="form-group">
                <label for="review">Written Review <span>(Optional)</span></label>
                <textarea id="review" name="review" rows="6"></textarea>
            </div>

            <div class="form-group">
                <label for="userName">Your Name <span>(Optional)</span></label>
                <input type="text" id="userName" name="userName">
            </div>

            <button type="submit">Post Review</button>
        </form>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span></p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
